name: Build RFCore Manager APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    # 1. 恢复现代安卓必备的 Java 17
    - name: Setup Java JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    # 🚨 2. 核心大招：强制引入官方 Gradle 8.4 环境，绕过你本地的烂摊子
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: '8.4'

    # 🚨 3. 注意这里用的是纯正的 `gradle` 命令，而不是你本地的 `./gradlew`
    - name: Build APK (Debug)
      run: gradle assembleDebug

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: RFCore-Manager-APK
        path: app/build/outputs/apk/debug/*.apk
