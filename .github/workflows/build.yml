name: Build RFCore Manager APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Java JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    # 🚨 终极绝杀：强行修改项目配置，将 Gradle 8.4 下载源指向腾讯云镜像！
    - name: Force Use Tencent Cloud Gradle Mirror
      run: |
        mkdir -p gradle/wrapper
        echo "distributionBase=GRADLE_USER_HOME" > gradle/wrapper/gradle-wrapper.properties
        echo "distributionPath=wrapper/dists" >> gradle/wrapper/gradle-wrapper.properties
        echo "distributionUrl=https\://mirrors.cloud.tencent.com/gradle/gradle-8.4-bin.zip" >> gradle/wrapper/gradle-wrapper.properties
        echo "zipStoreBase=GRADLE_USER_HOME" >> gradle/wrapper/gradle-wrapper.properties
        echo "zipStorePath=wrapper/dists" >> gradle/wrapper/gradle-wrapper.properties

    - name: Make Gradle Executable
      run: chmod +x ./gradlew

    # 🚨 使用本地的 gradlew，它会乖乖去腾讯云拉取 8.4 版本
    - name: Build APK (Debug)
      run: ./gradlew assembleDebug

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: RFCore-Manager-APK
        path: app/build/outputs/apk/debug/*.apk
