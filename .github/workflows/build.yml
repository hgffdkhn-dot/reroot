name: Build RFCore Manager

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Java (升级到 Java 17 支持现代 Compose)
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Auto-Heal Root build.gradle (配置现代构建环境)
      run: |
        cat << 'EOF' > build.gradle
        buildscript {
            repositories {
                google()
                mavenCentral()
            }
            dependencies {
                classpath "com.android.tools.build:gradle:8.1.1"
                classpath "org.jetbrains.kotlin:kotlin-gradle-plugin:1.8.10"
            }
        }
        task clean(type: Delete) {
            delete rootProject.buildDir
        }
        EOF

    - name: Auto-Heal App build.gradle (注入全套 Compose 与 AIDL 依赖)
      run: |
        cat << 'EOF' > app/build.gradle
        plugins {
            id 'com.android.application'
            id 'org.jetbrains.kotlin.android'
        }
        android {
            namespace 'com.rfcore.manager'
            compileSdk 34
            defaultConfig {
                applicationId "com.rfcore.manager"
                minSdk 29
                targetSdk 34
                versionCode 1
                versionName "1.0"
            }
            compileOptions {
                sourceCompatibility JavaVersion.VERSION_17
                targetCompatibility JavaVersion.VERSION_17
            }
            kotlinOptions {
                jvmTarget = '17'
            }
            buildFeatures {
                compose true
                aidl true
            }
            composeOptions {
                kotlinCompilerExtensionVersion '1.4.3'
            }
        }
        dependencies {
            implementation 'androidx.core:core-ktx:1.12.0'
            implementation 'androidx.lifecycle:lifecycle-runtime-ktx:2.6.2'
            implementation 'androidx.activity:activity-compose:1.8.0'
            implementation platform('androidx.compose:compose-bom:2023.10.01')
            implementation 'androidx.compose.ui:ui'
            implementation 'androidx.compose.material3:material3'
            implementation 'androidx.lifecycle:lifecycle-viewmodel-compose:2.6.2'
            implementation 'org.jetbrains.kotlinx:kotlinx-coroutines-android:1.7.3'
        }
        EOF

    - name: Grant execute permission for gradlew
      run: chmod +x ./gradlew

    - name: Build APK (Debug)
      run: ./gradlew assembleDebug 

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: RFCore-Manager-App
        path: app/build/outputs/apk/debug/*.apk

