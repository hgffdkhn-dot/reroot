name: Build RFCore Manager APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Java JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Force Use Tencent Cloud Gradle Mirror
      run: |
        mkdir -p gradle/wrapper
        echo "distributionBase=GRADLE_USER_HOME" > gradle/wrapper/gradle-wrapper.properties
        echo "distributionPath=wrapper/dists" >> gradle/wrapper/gradle-wrapper.properties
        echo "distributionUrl=https\://mirrors.cloud.tencent.com/gradle/gradle-8.4-bin.zip" >> gradle/wrapper/gradle-wrapper.properties
        echo "zipStoreBase=GRADLE_USER_HOME" >> gradle/wrapper/gradle-wrapper.properties
        echo "zipStorePath=wrapper/dists" >> gradle/wrapper/gradle-wrapper.properties

    - name: Make Gradle Executable
      run: chmod +x ./gradlew

    # 🚨 侦察与无差别打包
    - name: Build APK (All Variants)
      run: |
        # 1. 打印所有可用的构建任务（万一失败了，我们看日志就知道真正名字叫啥）
        ./gradlew tasks --all 
        
        # 2. 无差别全量打包！不管你是 Debug、Release 还是什么多渠道包，全给我打出来！
        ./gradlew assemble

    # 🚨 模糊捕获：不再局限于 debug 文件夹，只要是 apk 后缀的产物全抓走！
    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: RFCore-Manager-APK
        path: app/build/outputs/apk/**/*.apk
